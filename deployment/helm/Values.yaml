replicaCount: 1

image:
  repository: ghcr.io/tony-waters/spring-boot-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

app:
  javaOpts: "-Xms256m -Xmx512m"
  springProfilesActive: "default"

config:
  serverPort: "8080"
  managementEndpointsWebExposureInclude: "health,info"
  managementEndpointHealthProbesEnabled: "true"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: spring-jpa.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}