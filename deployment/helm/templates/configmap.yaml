apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spring-jpa.fullname" . }}
  labels:
    {{- include "spring-jpa.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.config.serverPort | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.app.springProfilesActive | quote }}
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: {{ .Values.config.managementEndpointsWebExposureInclude | quote }}
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: {{ .Values.config.managementEndpointHealthProbesEnabled | quote }}
  JAVA_OPTS: {{ .Values.app.javaOpts | quote }}